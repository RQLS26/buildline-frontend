name: Vercel Build Verification

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: vercel-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate Vercel build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_API_BASE_URL: https://buildline-platform.up.railway.app/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel SPA routing config
        run: test -f vercel.json

      - name: Build production bundle
        run: npm run build
